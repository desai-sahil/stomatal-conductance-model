name: Deploy Panel Dashboards to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Add any other required libraries your notebooks use (e.g., scipy, bokeh)
        run: pip install panel pandas matplotlib nbconvert scipy

      - name: Build Pyodide app
        run: |
          mkdir public
          panel convert hysteresis_dashboard.ipynb merilo_transients_dashboard.ipynb oscillations_dashboard.ipynb --to pyodide-worker --out public --index
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
